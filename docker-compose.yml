services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-durakhshon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-durakhshon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-durakhshon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-durakhshon}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-durakhshon}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-Demo1234!}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # nginx proxies /api to this upstream (substituted into the config at start)
      BACKEND_ORIGIN: http://backend:8000
      BACKEND_HOST: backend:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
